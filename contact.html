<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

html{
    font-size: 62.5%;
}

body{
    background: black;
    color: white;
}

header{
    position: fixed;
    top: 0;
    width: 100%;
    padding: 1.5rem 9%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    z-index: 100;
}

.logo{
    font-size: 3rem;
    color: #b74b4b;
    font-weight: 800;
}

nav a{
    font-size: 1.8rem;
    color: white;
    margin-left: 3rem;
}

nav a.active{
    color: #b74b4b;
}

section{
    padding: 10rem 9% 5rem;
}

h1{
    font-size: 5rem;
    text-align: center;
    margin-bottom: 5rem;
}

span{
    color: #b74b4b;
}

.contact-container{
    max-width: 700px;
    margin: auto;
    background: #161616;
    padding: 3rem;
    border-radius: 1.5rem;
}

.input-box{
    display: flex;
    flex-direction: column;
    margin-bottom: 2rem;
}

.input-box label{
    font-size: 1.6rem;
    margin-bottom: 0.5rem;
    color: #ccc;
}

.input-box input,
.input-box textarea{
    padding: 1.2rem;
    font-size: 1.5rem;
    border: none;
    outline: none;
    border-radius: 0.8rem;
    background: #000;
    color: white;
    border: 1px solid #333;
    transition: 0.3s;
}

.input-box input:focus,
.input-box textarea:focus{
    border-color: #b74b4b;
}

button{
    width: 100%;
    padding: 1.5rem;
    font-size: 1.8rem;
    background: #b74b4b;
    color: white;
    border: none;
    border-radius: 0.8rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: transparent;
    border: 1px solid #b74b4b;
}
</style>
</head>

<body>

<header>
    <div class="logo">Ahmad</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="skills.html">Skills</a>
        <a href="experience.html">Experience</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<section>
    <h1>Contact <span>Me</span></h1>

    <div class="contact-container">

        <form>

            <div class="input-box">
                <label>Name</label>
                <input type="text" placeholder="Your name">
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Your email">
            </div>

            <div class="input-box">
                <label>Message</label>
                <textarea rows="5" placeholder="Your message"></textarea>
            </div>

            <button type="submit">Send Message</button>

        </form>

    </div>
</section>

</body>
</html>
